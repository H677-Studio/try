<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Archive</title>
    <style>
        /* Pengaturan Dasar Biar Pas di Tengah & Mobile Friendly */
        body {
            margin: 0;
            padding: 0;
            background-color: #fce4ec; /* Warna background pink */
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center; /* Bikin semua ke tengah otomatis */
            justify-content: center;
            overflow: hidden; /* Biar web nggak bisa digeser aneh-aneh ke samping */
            position: relative;
        }

        /* Pengaturan Gambar Utama (Gantungan Kunci) */
        .main-image {
            width: 250px; /* Ukuran gambar */
            max-width: 80%; /* Biar di HP nggak kebesaran */
            z-index: 10;
        }

        /* Pengaturan Tombol Click Here */
        .btn {
            margin-top: 30px;
            background-color: #ff99cc; /* Warna tombol biasa */
            color: white;
            font-family: sans-serif;
            font-size: 18px;
            font-weight: bold;
            text-decoration: none;
            padding: 12px 40px;
            border-radius: 50px;
            z-index: 10;
            transition: 0.3s; /* Bikin efek ubah warna jadi halus */
            text-align: center;
        }

        /* Ini Efek Hover (Berubah warna pas disentuh kursor) */
        .btn:hover {
            background-color: #e65c99; /* Warna pas kursor di atasnya */
        }

        /* Pengaturan Bintang-bintang */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none; /* Biar bintang ga nutupin tombol click here */
        }

        .star {
            position: absolute;
        }

        /* Posisi dan ukuran tiap bintang */
        .star.s1 { top: 15%; left: 20%; transform: rotate(-15deg); width: 60px; }
        .star.s2 { top: 10%; left: 35%; transform: rotate(10deg); width: 30px; }
        .star.s3 { top: 40%; right: 15%; transform: rotate(-10deg); width: 45px; }
        .star.s4 { bottom: 25%; right: 25%; transform: rotate(20deg); width: 70px; }
        .star.s5 { bottom: 20%; left: 25%; transform: rotate(-20deg); width: 35px; }
        /* Tambahan bintang biar makin rame */
        .star.s6 { top: 25%; right: 25%; transform: rotate(15deg); width: 25px; } 
        .star.s7 { bottom: 35%; left: 15%; transform: rotate(-5deg); width: 40px; } 
        .star.s8 { top: 60%; left: 10%; transform: rotate(25deg); width: 30px; } 
        .star.s9 { bottom: 10%; right: 40%; transform: rotate(-15deg); width: 20px; } 

        /* Penyesuaian khusus layar HP kecil biar makin rapi */
        @media (max-width: 600px) {
            .star { transform: scale(0.7); } /* Bintangnya otomatis ngecil dikit */
            .main-image { width: 200px; }
        }
    </style>
</head>
<body>

    <!-- Kumpulan Bintang SVG (Tinggal biarin aja ini) -->
    <div class="stars">
        <svg class="star s1" viewBox="0 0 24 24" fill="#d8005f"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>

        <svg class="star s4" viewBox="0 0 24 24" fill="#d8005f"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg class="star s5" viewBox="0 0 24 24" fill="#d8005f"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg class="star s6" viewBox="0 0 24 24" fill="#d8005f"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <svg class="star s7" viewBox="0 0 24 24" fill="#d8005f"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
